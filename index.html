<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="JM Pricing">
<meta name="description" content="Export pricing calculator for Jaydev Multicomm">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23f59e0b' width='180' height='180' rx='36'/><text x='50%' y='50%' font-size='90' font-weight='800' fill='white' text-anchor='middle' dominant-baseline='central' font-family='sans-serif'>JM</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23f59e0b' width='180' height='180' rx='40'/><text x='50%' y='50%' font-size='90' font-weight='800' fill='white' text-anchor='middle' dominant-baseline='central' font-family='sans-serif'>JM</text></svg>">
<title>Jaydev Multicomm - Export Pricing</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..4₀,7₀₀;1,9..4₀,4₀₀&family=IBM+Plex+Mono:wght@3₀₀;4₀₀;5₀₀;6₀₀&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   TOKENS (Apple-inspired minimal palette)
═══════════════════════════════════════════ */
:root {
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --page:    #f9fafb;
  --surface: #ffffff;
  --inset:   #f3f4f6;
  --inset2:  #e5e7eb;

  --line:  rgba(0,0,0,0.06);
  --line2: rgba(0,0,0,0.08);
  --line3: rgba(0,0,0,0.12);

  --ink1: #111827;
  --ink2: #374151;
  --ink3: #6b7280;
  --ink4: #9ca3af;

  --a1:#b45309; --a2:#d97706; --a3:#f59e0b; --a4:#fbbf24; --a5:#fef3c7;
  --a-bd:rgba(245,158,11,0.26);

  --b1:#1d4ed8; --b2:#2563eb; --b3:#3b82f6; --b5:#eff6ff;
  --b-bd:rgba(59,130,246,0.20);

  --g1:#065f46; --g2:#059669; --g3:#10b981; --g5:#ecfdf5;
  --g-bd:rgba(16,185,129,0.20);

  --p2:#7c3aed; --p3:#8b5cf6; --p5:#f5f3ff;
  --p-bd:rgba(139,92,246,0.20);

  --o2:#ea580c; --o3:#f97316; --o5:#fff7ed;
  --o-bd:rgba(249,115,22,0.22);

  --r2:#dc2626;

  --sh0: 0 1px 2px rgba(0,0,0,0.04);
  --sh1: 0 1px 3px rgba(0,0,0,0.05), 0 2px 8px rgba(0,0,0,0.04);
  --sh2: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);

  --r8:8px; --r12:12px; --r16:16px; --rpill:999px;
  --sans:'DM Sans',sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --ease:cubic-bezier(0.4,0,0.2,1);

  /* Mobile panel switcher */
  --panel-inputs: 1;
  --panel-results: 0;
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

html {
  font-size: 14px;
  height: 100%;
  margin:0;
  padding:0;
  overflow-x:hidden;
  overflow-y:auto;
  min-height:100%;
  background:#f5f5f7;
}

body {
  font-family: var(--sans);
  background: var(--page);
  color: var(--ink1);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  padding: 0;
  margin: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bottom);
  -webkit-overflow-scrolling:touch;
}

body * { -webkit-user-select: text; user-select: text; }
input, select, textarea { -webkit-user-select: text; user-select: text; touch-action: manipulation; }

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
.hdr {
  position: sticky; top: 0; z-index: 500;
  min-height: calc(58px + var(--safe-top));
  padding-top: var(--safe-top);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--line2);
  box-shadow: var(--sh0);
  min-height: 52px;
}
.logo {
  display: flex; align-items: center; gap: 9px;
  min-width: 0;
}
.logo-mark {
  width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
  background: linear-gradient(145deg,var(--a3),var(--a2));
  box-shadow: 0 2px 10px rgba(245,158,11,0.28);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 13px; color: #fff; letter-spacing: -0.5px;
}
.logo-name {
  font-weight: 700; font-size: 14px; letter-spacing: -0.2px; color: var(--ink1);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.logo-sub {
  font-size: 10px; font-weight: 500; color: var(--ink3);
  background: var(--inset2); border: 1px solid var(--line2);
  padding: 3px 9px; border-radius: var(--rpill);
  white-space: nowrap; flex-shrink: 0;
}
/* Hide subtitle on very small screens */
@media (max-width: 400px) { .logo-sub { display: none; } }

.hdr-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.save-pill {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  padding: 4px 10px; border-radius: var(--rpill);
  background: var(--g5); color: var(--g2); border: 1px solid var(--g-bd);
  opacity: 0; transform: translateY(-3px) scale(0.96);
  transition: opacity 0.2s var(--ease), transform 0.2s var(--ease);
  pointer-events: none; white-space: nowrap;
}
.save-pill.show { opacity: 1; transform: none; }
#clock {
  font-family: var(--mono); font-size: 10px; color: var(--ink3);
  background: var(--inset); border: 1px solid var(--line);
  padding: 4px 10px; border-radius: var(--rpill); white-space: nowrap;
}
@media (max-width: 480px) { #clock { display: none; } }

/* ═══════════════════════════════════════════
   PRODUCT TABS
═══════════════════════════════════════════ */
.tabs-bar {
  position: sticky; top: calc(52px + env(safe-area-inset-top)); z-index: 400;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--line2);
}
.tabs-scroll {
  display: flex; align-items: center; gap: 2px;
  padding: 0 12px; height: 44px;
  overflow-x: auto; scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.tabs-scroll::-webkit-scrollbar { display: none; }
.tab {
  padding: 5px 13px;
  font-family: var(--sans); font-weight: 600; font-size: 12px;
  border: 1px solid transparent; border-radius: var(--rpill);
  background: none; color: var(--ink3);
  cursor: pointer; white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
  transition: all 0.14s var(--ease);
  -webkit-tap-highlight-color: transparent;
}
.tab:hover:not(.soon) { background: var(--inset2); color: var(--ink2); border-color: var(--line2); }
.tab.active { background: var(--a5); color: var(--a1); border-color: var(--a-bd); font-weight: 700; }
.tab.soon { opacity: 0.35; cursor: not-allowed; }
.soon-pip {
  font-family: var(--mono); font-size: 8px;
  background: var(--inset2); color: var(--ink4);
  padding: 2px 5px; border-radius: 4px; border: 1px solid var(--line);
}

/* ═══════════════════════════════════════════
   MOBILE PANEL SWITCHER (Inputs / Results)
   Only visible on mobile (<= 768px)
═══════════════════════════════════════════ */
.panel-switcher {
  display: none; /* shown via media query */
  position: static;
  z-index: 300;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line2);
  padding: 12px 16px;
  padding-left: max(16px, env(safe-area-inset-left));
  padding-right: max(16px, env(safe-area-inset-right));
}
.panel-toggle {
  display: flex;
  background: var(--inset2);
  border: 1px solid var(--line2);
  border-radius: var(--rpill);
  padding: 4px;
  gap: 3px;
}
.ptab {
  flex: 1; padding: 10px 12px;
  font-family: var(--sans); font-weight: 600; font-size: 13px;
  border: none; border-radius: var(--rpill);
  background: none; color: var(--ink3);
  cursor: pointer; transition: all 0.15s var(--ease);
  -webkit-tap-highlight-color: transparent;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ptab.active {
  background: var(--surface); color: var(--ink1);
  box-shadow: var(--sh1);
}

@media (max-width: 768px) {
  .panel-switcher { 
    display: block;
  }
}

/* ═══════════════════════════════════════════
   SHELL - desktop two-column, mobile stacked
═══════════════════════════════════════════ */
.shell {
  display: grid;
  grid-template-columns: 390px 1fr;
  min-height: calc(100dvh - 96px - env(safe-area-inset-top));
  overflow: visible;
  width: 100%;
}

.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--line2);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  scrollbar-color: var(--line3) transparent;
  display: flex;
  flex-direction: column;
}
.sidebar > * {
  flex-shrink: 0;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 2px; }

.results {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px max(18px, env(safe-area-inset-right)) 40px max(18px, env(safe-area-inset-left));
  scrollbar-width: thin;
  scrollbar-color: var(--line3) transparent;
  display: flex;
  flex-direction: column;
  min-height: 100%;
}
.results > * {
  flex-shrink: 0;
}
.results::-webkit-scrollbar { width: 4px; }
.results::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 2px; }

/* ── Mobile layout overrides ── */
@media (max-width: 768px) {
  .shell {
    grid-template-columns: 1fr;
    min-height: calc(100dvh - 152px - env(safe-area-inset-top));
    overflow-y: auto;
    overflow-x: hidden;
  }
  .sidebar, .results {
    width: 100%;
    height: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    border-right: none;
    padding-bottom: max(20px, env(safe-area-inset-bottom));
  }

  /* Panel visibility controlled by JS-toggled classes */
  .sidebar { display: flex !important; flex-direction: column; }
  .results  { display: flex !important; flex-direction: column; }
  .sidebar.mobile-hidden { display: none !important; }
  .results.mobile-hidden  { display: none !important; }
}

/* ═══════════════════════════════════════════
   SIDEBAR SECTION HEADERS
═══════════════════════════════════════════ */
.sec-head {
  position: sticky; top: 0; z-index: 20;
  padding: 9px 14px;
  background: rgba(255,255,255,0.94);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
}
.sec-label {
  display: flex; align-items: center; gap: 7px;
  font-family: var(--sans); font-size: 10px; font-weight: 700;
  letter-spacing: 0.7px; text-transform: uppercase;
}
.sec-label::before {
  content: ''; width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.sec-label.amber { color: var(--a2); }
.sec-label.amber::before { background: var(--a3); box-shadow: 0 0 6px rgba(245,158,11,0.5); }
.sec-label.blue  { color: var(--b2); }
.sec-label.blue::before  { background: var(--b3); box-shadow: 0 0 6px rgba(59,130,246,0.5); }
.sec-label.teal  { color: #0891b2; }
.sec-label.teal::before  { background: #06b6d4; box-shadow: 0 0 6px rgba(6,182,212,0.5); }

.sec-tag {
  font-family: var(--mono); font-size: 9px; color: var(--ink4);
  background: var(--inset2); border: 1px solid var(--line);
  padding: 2px 8px; border-radius: var(--rpill); white-space: nowrap;
}
.reset-btn {
  font-family: var(--sans); font-size: 10px; font-weight: 600;
  padding: 5px 12px; border-radius: var(--rpill);
  border: 1px solid var(--line2); background: var(--surface); color: var(--ink3);
  cursor: pointer; transition: all 0.13s var(--ease);
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
.reset-btn:hover, .reset-btn:active {
  border-color: rgba(220,38,38,0.32); color: var(--r2);
  background: rgba(220,38,38,0.04);
}

/* ═══════════════════════════════════════════
   INPUT ROWS
═══════════════════════════════════════════ */
.inp-row {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center; gap: 12px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  transition: background 0.1s;
  min-height: 60px;
}
.inp-row:active  { background: var(--inset); }
.inp-row:last-child { border-bottom: none; }
.inp-lbl  { font-size: 13px; font-weight: 500; color: var(--ink2); line-height: 1.3; }
.inp-unit { font-family: var(--mono); font-size: 9px; color: var(--ink4); margin-top: 2px; }

.inp-ctrl { width: 112px; }
@media (max-width: 480px) { 
  .inp-ctrl { width: 100%; max-width: 140px; }
  .inp-row { grid-template-columns: 1fr auto; align-items: stretch; }
}
@media (max-width: 380px) { 
  .inp-ctrl { max-width: 120px; }
}

input[type=number], select {
  width: 100%; border-radius: var(--r8);
  padding: 8px 10px;
  font-family: var(--mono); font-size: 13px; font-weight: 500;
  outline: none; transition: all 0.13s var(--ease);
  border: 1.5px solid transparent; appearance: none;
  background-size: 24px 24px, 100% 100%;
  background-repeat: no-repeat, no-repeat;
  background-position: right 8px center, 0 0;
}
@media (max-width: 768px) {
  input[type=number], select { 
    font-size: 14px;
    padding: 9px 10px;
    height: 40px;
  }
}
@media (max-width: 768px) {
  html {
    font-size: 13px;
  }
}
input[type=number] { text-align: right; }
select { cursor: pointer; padding: 8px 8px; }

.dai { background: rgba(254,243,199,0.55); border-color: rgba(245,158,11,0.22); color: var(--a1); }
.dai:hover:not(:focus) { border-color: rgba(245,158,11,0.38); }
.dai:focus { background: var(--a5); border-color: var(--a3); box-shadow: 0 0 0 3px rgba(245,158,11,0.12); }

.fix { background: rgba(239,246,255,0.7); border-color: var(--b-bd); color: var(--b1); }
.fix:hover:not(:focus) { border-color: rgba(59,130,246,0.38); }
.fix:focus { background: var(--b5); border-color: var(--b3); box-shadow: 0 0 0 3px rgba(59,130,246,0.10); }

input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button {
  -webkit-appearance: none;
  appearance: none;
}
input[type=number] {
  -moz-appearance: textfield;
  appearance: textfield;
}

/* ═══════════════════════════════════════════
   RESULTS - SPEC STRIP
═══════════════════════════════════════════ */
.spec-strip {
  background: var(--surface); border: 1px solid var(--line2);
  border-radius: var(--r16); overflow: hidden;
  box-shadow: var(--sh1); margin-bottom: 14px;
  position: relative;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
}
.spec-strip::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg,var(--b3),var(--a3),var(--g3));
}
.spec-cell {
  padding: 12px 14px;
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  min-width: 0;
}
/* Remove right border on last in each row, bottom on last row */
.spec-cell:last-child { border-right: none; }
@media (max-width: 480px) {
  .spec-strip { grid-template-columns: 1fr 1fr; }
  .spec-cell:nth-child(2n) { border-right: none; }
}
.spec-k { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--ink4); margin-bottom: 4px; }
.spec-v { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--ink1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ═══════════════════════════════════════════
   BREAKEVEN CARDS
═══════════════════════════════════════════ */
.be-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
@media (max-width: 480px) { .be-row { grid-template-columns: 1fr; } }

.be-card {
  background: var(--surface); border: 1px solid var(--line2);
  border-radius: var(--r16); padding: 16px;
  position: relative; overflow: hidden;
  box-shadow: var(--sh1); transition: box-shadow 0.15s var(--ease);
}
.be-card:hover { box-shadow: var(--sh2); }
.be-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg,var(--o3),var(--a3));
}
.be-label { font-size: 10px; font-weight: 700; color: var(--ink3); letter-spacing: 0.4px; text-transform: uppercase; margin-bottom: 8px; }
.be-big { font-family: var(--mono); font-size: 20px; font-weight: 700; color: var(--o2); letter-spacing: -0.5px; line-height: 1; }
@media (max-width: 380px) { .be-big { font-size: 17px; } }
.be-small { font-family: var(--mono); font-size: 10px; color: var(--ink4); margin-top: 6px; line-height: 1.6; }

/* ═══════════════════════════════════════════
   COST CARDS (transparent build-up)
═══════════════════════════════════════════ */
.breakdown-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
@media (max-width: 640px) { .breakdown-row { grid-template-columns: 1fr; } }

.cost-card {
  background: var(--surface); border: 1px solid var(--line2);
  border-radius: var(--r16); overflow: hidden; box-shadow: var(--sh1);
}

/* Cost card header */
.cost-head {
  padding: 11px 14px; border-bottom: 1px solid var(--line2);
  display: flex; align-items: center; gap: 8px;
  font-family: var(--sans); font-size: 10px; font-weight: 700;
  letter-spacing: 0.7px; text-transform: uppercase;
}
.cost-head::before { content: ''; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

.cost-head.fob   { color: var(--b2);  background: linear-gradient(90deg,var(--b5),transparent); }
.cost-head.fob::before   { background: var(--b3); box-shadow: 0 0 5px rgba(59,130,246,0.45); }
.cost-head.cif   { color: var(--g2);  background: linear-gradient(90deg,var(--g5),transparent); }
.cost-head.cif::before   { background: var(--g3); box-shadow: 0 0 5px rgba(16,185,129,0.45); }
.cost-head.amber { color: var(--a1);  background: linear-gradient(90deg,var(--a5),transparent); }
.cost-head.amber::before { background: var(--a3); box-shadow: 0 0 5px rgba(245,158,11,0.45); }
.cost-head.purple{ color: var(--p2);  background: linear-gradient(90deg,var(--p5),transparent); }
.cost-head.purple::before{ background: var(--p3); box-shadow: 0 0 5px rgba(139,92,246,0.45); }
.cost-head.neutral{ color: var(--ink2); background: var(--inset2); }
.cost-head.neutral::before{ background: var(--ink4); }

.cost-section { border-bottom: 1px solid var(--line); }
.cost-section:last-child { border-bottom: none; }

.cost-sec-title {
  padding: 5px 14px 4px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.9px; text-transform: uppercase;
  color: var(--ink4); background: var(--inset2);
  border-bottom: 1px solid var(--line);
}

.cost-line {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 8px 14px; border-bottom: 1px solid var(--line);
  gap: 8px; transition: background 0.1s;
}
.cost-line:hover { background: var(--inset); }
.cost-line:last-child { border-bottom: none; }
.cost-line-left { flex: 1; min-width: 0; }
.cost-line-name { font-size: 12px; font-weight: 400; color: var(--ink2); line-height: 1.3; }
.cost-line-desc { font-family: var(--mono); font-size: 9px; color: var(--ink4); margin-top: 2px; line-height: 1.4; word-break: break-word; }
.cost-line-val  { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--ink1); white-space: nowrap; flex-shrink: 0; padding-top: 1px; }

.cost-line.subtotal {
  background: var(--inset2); border-top: 1.5px solid var(--line2);

/* Updated sulphuric acid port charges as per the new charge sheet */

function loadState(id, def) {
  try { const s = localStorage.getItem('jm5_'+id); if (s) return { ...def, ...JSON.parse(s) }; } catch(e) {}
  return { ...def };
}
function saveState(id, data) {
  try { localStorage.setItem('jm5_'+id, JSON.stringify(data)); flashSave(); } catch(e) {}
}
let _st;
function flashSave() {
  const el = document.getElementById('savePill');
  el.classList.add('show');
  clearTimeout(_st);
  _st = setTimeout(() => el.classList.remove('show'), 2000);
}

window.showPanel = function(panel) {
  mobilePanel = panel;
  const sidebar = document.querySelector('.sidebar');
  const results = document.querySelector('.results');
  const ptI = document.getElementById('ptabInputs');
  const ptR = document.getElementById('ptabResults');

      sidebar.classList.remove('mobile-hidden');
      results.classList.add('mobile-hidden');
      ptI.classList.add('active');
      ptR.classList.remove('active');
    } else {
      sidebar.classList.add('mobile-hidden');
      results.classList.remove('mobile-hidden');
      ptI.classList.remove('active');
      ptR.classList.add('active');
    }
  }
};

function applyMobilePanel() {
  if (window.innerWidth <= 768) showPanel(mobilePanel);
  else {
    const sidebar = document.querySelector('.sidebar');
    const results = document.querySelector('.results');

/* ═══════════════════════════════════════
   CALCULATIONS
═══════════════════════════════════════ */
function calcCaustic(d) {
  const pkg  = PKG.caustic.find(p => p.id === d.selected_packaging);
  const units = d.bags_per_container ?? pkg.units_per_container;
  const uwt   = d.bag_weight        ?? pkg.unit_weight;
  const ucost = d.pkg_unit_cost     ?? pkg.unit_cost;

  const total_kg    = units * uwt * (1 - d.moisture / 100);
  const total_mt    = total_kg / 1000;
  const procurement = d.basic_rate * total_kg;
  const packing     = ucost * units;
  const port        = d.custom_clearance + d.carting_exam + d.vgm_form13
                    + d.lacing_choking   + d.unloading    + d.cfs_handling
                    + d.container_repo   + d.lifton       + d.terminal_handling
                    + d.shipping_line_local + d.fumigation + d.lashing;

  const fob_inr        = procurement + packing + d.transport + port;
  const fob_usd        = fob_inr / d.usd_inr;
  const fob_per_kg_usd = fob_usd / total_kg;
  const fob_per_mt_usd = fob_per_kg_usd * 1000;

  const ocean_inr = d.ocean_frt * d.usd_inr;
  const ins_inr   = fob_inr * d.insurance / 100;
  const cif_inr   = fob_inr + ocean_inr + ins_inr;
  const cif_usd   = cif_inr / d.usd_inr;
  const cif_per_kg_usd = cif_usd / total_kg;
  const cif_per_mt_usd = cif_per_kg_usd * 1000;

  const sfob_kg = fob_per_kg_usd * (1 + d.margin / 100);
  const scif_kg = cif_per_kg_usd * (1 + d.margin / 100);

  return {
    units, total_kg, total_mt, procurement, packing, transport: d.transport, port,
    fob_inr, fob_usd, fob_per_kg_usd, fob_per_mt_usd,
    ocean_inr, ins_inr, cif_inr, cif_usd, cif_per_kg_usd, cif_per_mt_usd,
    sfob_kg, sfob_mt: sfob_kg * 1000, sfob_ctr: sfob_kg * total_kg,
    scif_kg, scif_mt: scif_kg * 1000, scif_ctr: scif_kg * total_kg,
    mfob_mt: (sfob_kg - fob_per_kg_usd) * 1000,  mfob_ctr: (sfob_kg - fob_per_kg_usd) * total_kg,
    mcif_mt: (scif_kg - cif_per_kg_usd) * 1000,  mcif_ctr: (scif_kg - cif_per_kg_usd) * total_kg,
  };
}

function calcSulphuric(d) {
  const pkg  = PKG.sulphuric.find(p => p.id === d.selected_packaging);
  const units = d.pkg_units_per_ctr ?? pkg.units_per_container;
  const uwt   = d.pkg_unit_weight   ?? pkg.unit_weight;
  const ucost = d.pkg_unit_cost     ?? pkg.unit_cost;

  const total_kg    = units * uwt;
  const total_mt    = total_kg / 1000;
  const procurement = d.basic_rate * total_kg;
  const packing     = ucost * units;
  const transport   = d.transport_kg * total_kg;
  const dg_inr      = d.dg_usd * d.usd_inr;

  const port_local  = d.custom_clearance + d.carting_exam + d.vgm_form13
                    + d.lacing_choking   + d.unloading    + d.cfs_handling
                    + d.container_repo   + d.lifton       + d.ship_line;
  const port = port_local + d.imdg + dg_inr;

  const fob_inr        = procurement + packing + transport + port;
  const fob_usd        = fob_inr / d.usd_inr;
  const fob_per_kg_usd = fob_usd / total_kg;
  const fob_per_mt_usd = fob_per_kg_usd * 1000;

  const ocean_inr = d.ocean_frt * d.usd_inr;
  const ins_inr   = fob_inr * d.insurance / 100;
  const cif_inr   = fob_inr + ocean_inr + ins_inr;
  const cif_usd   = cif_inr / d.usd_inr;
  const cif_per_kg_usd = cif_usd / total_kg;
  const cif_per_mt_usd = cif_per_kg_usd * 1000;

  const sfob_kg = fob_per_kg_usd * (1 + d.margin / 100);
  const scif_kg = cif_per_kg_usd * (1 + d.margin / 100);

  return {
    total_kg, total_mt, procurement, packing, transport, dg_inr, port_local, port,
    fob_inr, fob_usd, fob_per_kg_usd, fob_per_mt_usd,
    ocean_inr, ins_inr, cif_inr, cif_usd, cif_per_kg_usd, cif_per_mt_usd,
    sfob_kg, sfob_mt: sfob_kg * 1000, sfob_ctr: sfob_kg * total_kg,
    scif_kg, scif_mt: scif_kg * 1000, scif_ctr: scif_kg * total_kg,
    mfob_mt: (sfob_kg - fob_per_kg_usd) * 1000,  mfob_ctr: (sfob_kg - fob_per_kg_usd) * total_kg,
    mcif_mt: (scif_kg - cif_per_kg_usd) * 1000,  mcif_ctr: (scif_kg - cif_per_kg_usd) * total_kg,
  };
}

/**
 * Builds clean, client-facing plain-text quotation.
 * NEVER exposes INR, break-even, internal costing, or margin.
 * Auto-determines FOB-only vs FOB+CIF based on freight inputs.
 */
function buildCustomerQuote(productName, packName, c, d) {
  const qtyMt  = f2(c.total_mt);
  const qtyKg  = f0(c.total_kg);
  const destPort = (d.dest_port || '').trim();
  const hasCif   = c.ocean_inr > 0 || c.ins_inr > 0;

  const fobLines =
    `FOB Mundra Port, India\n` +
    `  ${usd(c.sfob_kg, 4)} / KG\n` +
    `  ${usd(c.sfob_mt, 2)} / MT\n` +
    `  ${usd(c.sfob_ctr, 0)} / FCL`;

  const cifLines = hasCif
    ? `\nCIF ${destPort || '[Destination Port]'}\n` +
      `  ${usd(c.scif_kg, 4)} / KG\n` +
      `  ${usd(c.scif_mt, 2)} / MT\n` +
      `  ${usd(c.scif_ctr, 0)} / FCL`
    : '';

  return (
    `Dear Sir,\n\n` +
    `We are pleased to offer the following:\n\n` +
    `${productName}\n` +
    `Packing: ${packName}\n` +
    `Quantity: ${qtyMt} MT (${qtyKg} KG)\n\n` +
    `${fobLines}${cifLines}\n\n` +
    `Offer Validity: 2 Days\n\n` +
    `Kindly let us know your required quantity and destination port.\n\n` +
    `Regards,\nJaydev Multicomm Pvt Ltd`
  );
}

/** Live-updates dest_port in state and patches preview only (no full re-render) */
window.updDestPort = function(prod, val) {
  S[prod].dest_port = val;
  saveState(prod, S[prod]);
  const el = document.getElementById('quotePreview_' + prod);
  if (!el) return;
  const d = S[prod];
  const c = prod === 'caustic' ? calcCaustic(d) : calcSulphuric(d);
  const pkg = PKG[prod].find(p => p.id === d.selected_packaging);
  const productName = prod === 'caustic' ? 'Caustic Soda Flakes' : 'Sulphuric Acid 98%';
  el.textContent = buildCustomerQuote(productName, pkg.name, c, d);
};

window.copyCustomerQuote = function(prod) {
  const d = S[prod];
  const c = prod === 'caustic' ? calcCaustic(d) : calcSulphuric(d);
  const pkg = PKG[prod].find(p => p.id === d.selected_packaging);
  const productName = prod === 'caustic' ? 'Caustic Soda Flakes' : 'Sulphuric Acid 98%';
  const msg = buildCustomerQuote(productName, pkg.name, c, d);

  const showPill = () => {
    const pill = document.getElementById('copyPill_' + prod);
    if (pill) {
      pill.classList.add('show');
      setTimeout(() => pill.classList.remove('show'), 1800);
    }
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(msg).then(showPill).catch(() => {
      window.prompt('Copy Customer Quote:', msg);
    });
  } else {
    window.prompt('Copy Customer Quote:', msg);
    showPill();
  }
};

    <div class="cost-card">
      <div class="cost-head fob">FOB - Full Cost Build-up</div>
      <div class="cost-section">
        ${CSEC('Procurement')}
        ${CL('Sulphuric Acid 98%', inr(c.procurement), d.basic_rate+' ₹/kg × '+f0(c.total_kg)+' kg')}
        ${CL('Packaging - '+pkg.name, inr(c.packing), ucost+' ₹/unit × '+f0(pkg.units_per_container)+' units')}
        ${CL('Transport - Plant to Port', inr(c.transport), d.transport_kg+' ₹/kg × '+f0(c.total_kg)+' kg')}
        ${CST('Sub-total', inr(c.procurement + c.packing + c.transport))}
      </div>
      <div class="cost-section">
        ${CSEC('Port & CFS Charges')}
        ${CL('Custom Clearance', inr(d.custom_clearance))}
        ${CL('Carting / Examination', inr(d.carting_exam))}
        ${CL('VGM & Form 13 Filing', inr(d.vgm_form13))}
        ${CL('Lacing / Choking', inr(d.lacing_choking), 'Belt & Wooden Edge - variable')}
        ${CL('Unloading', inr(d.unloading))}
        ${CL('CFS Handling (Receipted)', inr(d.cfs_handling))}
        ${CL('Container Repo Charges', inr(d.container_repo))}
        ${CL('Lift-on Charge', inr(d.lifton))}
        ${CL('Shipping Line (BL + THC)', inr(d.ship_line))}
        ${CST('Sub-total Port & CFS', inr(portSubLocal))}
      </div>
      <div class="cost-section">
        ${CSEC('DG / Hazmat Charges')}
        ${CL('DG Surcharge (UN 1830, Class 8)', inr(c.dg_inr), d.dg_usd+' $/FCL × ₹'+d.usd_inr)}
        ${CL('IMDG / DG Documentation', inr(d.imdg))}
        ${CST('Sub-total DG', inr(c.dg_inr + d.imdg))}
      </div>
      ${CTL('FOB TOTAL', inr(c.fob_inr)+' · '+usd(c.fob_usd,0), 'fob')}
      <div class="formula-note">
        <strong>FOB/KG</strong> = ${inr(c.fob_inr)} ÷ ${f0(c.total_kg)} kg ÷ ${d.usd_inr} = <strong>${usd(c.fob_per_kg_usd,4)}</strong>
        &nbsp;|&nbsp; <strong>FOB/MT</strong> = ${usd(c.fob_per_mt_usd,2)}
      </div>
    </div>
    <div class="cost-card">
      <div class="cost-head cif">CIF - Full Landed Cost</div>
      <div class="cost-section">
        ${CSEC('FOB Base')}
        ${CL('FOB (as calculated)', inr(c.fob_inr), usd(c.fob_usd,0))}
      </div>
      <div class="cost-section">
        ${CSEC('Freight & Insurance')}
        ${CL('Ocean Freight', inr(c.ocean_inr), d.ocean_frt+' $/Container × ₹'+d.usd_inr)}
        ${CL('Marine Insurance', inr(c.ins_inr), d.insurance+'% of FOB value')}
        ${CST('Sub-total', inr(c.ocean_inr + c.ins_inr))}
      </div>
      ${CTL('CIF TOTAL', inr(c.cif_inr)+' · '+usd(c.cif_usd,0), 'cif')}
      <div class="formula-note">
        <strong>CIF/KG</strong> = ${inr(c.cif_inr)} ÷ ${f0(c.total_kg)} kg ÷ ${d.usd_inr} = <strong>${usd(c.cif_per_kg_usd,4)}</strong>
        &nbsp;|&nbsp; <strong>CIF/MT</strong> = ${usd(c.cif_per_mt_usd,2)}
      </div>
    </div>
  </div>
  ${renderCustomerQuoteCard('sulphuric', c, d, pkg, 'Sulphuric Acid 98%')}
</section>
</div>`;
}

/* ═══════════════════════════════════════
   EVENTS
═══════════════════════════════════════ */
let _deb;
window.upd = function(prod, key, val) {
  /* FIX: parseFloat('0') is falsy - use explicit check */
  const num = parseFloat(val);
  S[prod][key] = isNaN(num) ? val : num;
  if (key === 'selected_packaging') {
    delete S[prod].pkg_unit_weight;
    delete S[prod].pkg_units_per_ctr;
  }
  saveState(prod, S[prod]);
  clearTimeout(_deb);
  _deb = setTimeout(() => patchResults(), 80);
};

window.reset = function(prod) {
  const def = prod === 'caustic' ? DEF_CAUSTIC : DEF_SULPHURIC;
  S[prod] = { ...def };
  delete S[prod].pkg_unit_weight;
  delete S[prod].pkg_units_per_ctr;
  localStorage.removeItem('jm5_'+prod);
  render();
};

window.switchTab = function(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p || !p.active) return;
  active = id;
  render();
};

/* Only patch the results panel - keeps sidebar inputs focused */
function patchResults() {
  const rp = document.querySelector('.results');
  if (!rp) { render(); return; }
  const tmp = document.createElement('div');
  tmp.innerHTML = active === 'caustic' ? renderCaustic() : renderSulphuric();
  const nr = tmp.querySelector('.results');
  if (nr) rp.innerHTML = nr.innerHTML;
}

function render() {
  /* Tabs */
  document.getElementById('tabs').innerHTML = PRODUCTS.map(p => `
    <button class="tab${p.active && active === p.id ? ' active' : ''}${!p.active ? ' soon' : ''}"
      onclick="switchTab('${p.id}')">
      ${p.label}
      ${p.sub ? `<span style="opacity:0.5;font-weight:400;font-size:10px">${p.sub}</span>` : ''}
      ${!p.active ? `<span class="soon-pip">SOON</span>` : ''}
    </button>`).join('');

  const app = document.getElementById('app');
  if (active === 'caustic')        app.innerHTML = renderCaustic();
  else if (active === 'sulphuric') app.innerHTML = renderSulphuric();
  else {
    const p = PRODUCTS.find(x => x.id === active);
    app.innerHTML = `<div class="cs"><h2>${p.label}</h2><p>Calculator coming soon.</p></div>`;
  }

  applyMobilePanel();
}

/* Clock */
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent =
    n.toLocaleDateString('en-IN') + ' · ' +
    n.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
}
tick(); setInterval(tick, 30000);

render();

/* Register service worker for PWA */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js').catch(err => {
    console.log('ServiceWorker registration failed: ', err);
  });
}
</script>
</body>
