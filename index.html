<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaydev Multicomm — Export Pricing</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════ */
:root {
  --bg:   #08090d;
  --s1:   #111318;
  --s2:   #181c26;
  --s3:   #1f2433;
  --s4:   #2a3045;
  --s5:   #354060;

  --sep:  rgba(255,255,255,.07);
  --sep2: rgba(255,255,255,.04);

  --l1: #f0f2f8;
  --l2: rgba(215,222,245,.6);
  --l3: rgba(215,222,245,.35);
  --l4: rgba(215,222,245,.15);

  --amber:  #f5a623;
  --amber2: rgba(245,166,35,.12);
  --amber3: rgba(245,166,35,.06);
  --blue:   #4d8ef5;
  --blue2:  rgba(77,142,245,.12);
  --blue3:  rgba(77,142,245,.06);
  --green:  #3ecf8e;
  --green2: rgba(62,207,142,.1);
  --purple: #a78bfa;
  --red:    #f56565;

  --fn: 'Plus Jakarta Sans', sans-serif;
  --fm: 'JetBrains Mono', monospace;

  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 20px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--l1);
  font-family: var(--fn);
  min-height: 100vh;
  /* subtle noise texture via SVG */
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.025'/%3E%3C/svg%3E");
}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
.hdr {
  position: sticky; top: 0; z-index: 200;
  height: 58px; padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(8,9,13,.85);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid var(--sep);
}
.logo-wrap { display: flex; align-items: center; gap: 11px; }
.logo-icon {
  width: 34px; height: 34px; border-radius: 9px;
  background: linear-gradient(135deg, var(--amber), #e08910);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--fm); font-size: 12px; font-weight: 700; color: #000; letter-spacing: -1px;
  box-shadow: 0 2px 8px rgba(245,166,35,.35);
}
.logo-info { display: flex; flex-direction: column; gap: 1px; }
.logo-name { font-size: 14px; font-weight: 700; color: var(--l1); letter-spacing: -0.3px; }
.logo-sub  { font-size: 10px; color: var(--l3); font-weight: 500; letter-spacing: .2px; }
.hdr-right { display: flex; align-items: center; gap: 14px; }
#clock { font-family: var(--fm); font-size: 10px; color: var(--l4); }
.save-chip {
  font-size: 10px; font-weight: 600; padding: 4px 12px; border-radius: 20px; letter-spacing: .2px;
  background: var(--green2); color: var(--green); border: 1px solid rgba(62,207,142,.25);
  opacity: 0; transition: opacity .3s; pointer-events: none;
}
.save-chip.show { opacity: 1; }

/* ═══════════════════════════════════════════
   TAB BAR
═══════════════════════════════════════════ */
.tab-bar {
  position: sticky; top: 58px; z-index: 199;
  padding: 10px 20px;
  display: flex; gap: 6px; overflow-x: auto;
  background: rgba(8,9,13,.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--sep);
}
.tab-bar::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 6px 16px; border-radius: 30px; border: 1px solid transparent;
  cursor: pointer; font-family: var(--fn); font-size: 12px; font-weight: 600; letter-spacing: .1px;
  background: var(--s2); color: var(--l3); transition: all .18s; white-space: nowrap;
}
.tab-btn:hover { background: var(--s3); color: var(--l2); border-color: var(--sep); }
.tab-btn.active { background: var(--amber); color: #000; border-color: transparent; box-shadow: 0 2px 10px rgba(245,166,35,.3); }
.tab-btn.soon { opacity: .3; cursor: not-allowed; pointer-events: none; }
.tab-btn .soon-tag {
  font-size: 9px; font-weight: 700; background: var(--s4); padding: 1px 5px; border-radius: 4px;
  margin-left: 5px; vertical-align: middle; color: var(--l4); letter-spacing: 0;
}

/* ═══════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════ */
.layout {
  display: grid;
  grid-template-columns: 368px 1fr;
  height: calc(100vh - 106px);
}
.panel-left {
  background: var(--s1);
  border-right: 1px solid var(--sep);
  overflow-y: auto;
  height: 100%;
}
.panel-right {
  overflow-y: auto;
  height: 100%;
  padding: 18px 20px 32px;
  background: var(--bg);
}
/* scrollbars */
.panel-left::-webkit-scrollbar,
.panel-right::-webkit-scrollbar { width: 4px; }
.panel-left::-webkit-scrollbar-track,
.panel-right::-webkit-scrollbar-track { background: transparent; }
.panel-left::-webkit-scrollbar-thumb,
.panel-right::-webkit-scrollbar-thumb { background: var(--s5); border-radius: 4px; }

/* ═══════════════════════════════════════════
   INPUT PANEL — iOS Settings Style
═══════════════════════════════════════════ */
.inp-section { padding: 14px 14px 0; }
.inp-section:last-child { padding-bottom: 20px; }
.inp-section-hdr {
  font-size: 10.5px; font-weight: 700; color: var(--l4);
  text-transform: uppercase; letter-spacing: 1px;
  padding: 0 4px 7px;
  display: flex; justify-content: space-between; align-items: center;
}
.inp-section-hdr .reset-link {
  font-size: 11px; color: var(--blue); text-transform: none;
  letter-spacing: 0; cursor: pointer; font-weight: 600; padding: 2px 0;
}
.inp-group {
  background: var(--s2); border-radius: var(--r-lg);
  border: 1px solid var(--sep); overflow: hidden;
}
.inp-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 14px; min-height: 52px;
  border-bottom: 1px solid var(--sep2);
  gap: 12px;
}
.inp-item:last-child { border-bottom: none; }
.inp-item.select-item { flex-direction: column; align-items: stretch; padding: 10px 14px; gap: 7px; }
.inp-meta { flex: 1; min-width: 0; }
.inp-label { font-size: 13px; font-weight: 500; color: var(--l1); line-height: 1.3; }
.inp-unit  { font-family: var(--fm); font-size: 10px; color: var(--l4); margin-top: 2px; }

/* Number inputs */
input[type=number] {
  width: 112px; text-align: right;
  font-family: var(--fm); font-size: 13px; font-weight: 600;
  border-radius: var(--r-sm); padding: 7px 10px; outline: none;
  border: 1.5px solid transparent; transition: all .18s;
  -moz-appearance: textfield; appearance: textfield;
}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number].d-inp {
  background: var(--amber2); border-color: rgba(245,166,35,.25); color: var(--amber);
}
input[type=number].d-inp:focus {
  border-color: var(--amber); box-shadow: 0 0 0 3px rgba(245,166,35,.14);
}
input[type=number].f-inp {
  background: var(--blue2); border-color: rgba(77,142,245,.22); color: var(--blue);
}
input[type=number].f-inp:focus {
  border-color: var(--blue); box-shadow: 0 0 0 3px rgba(77,142,245,.14);
}
select {
  width: 100%; font-family: var(--fn); font-size: 13px; font-weight: 500;
  border-radius: var(--r-sm); padding: 8px 10px; outline: none; cursor: pointer;
  background: var(--s3); border: 1.5px solid var(--sep); color: var(--l1); transition: all .15s;
}
select:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(245,166,35,.1); }

/* ═══════════════════════════════════════════
   RESULT CARDS
═══════════════════════════════════════════ */
.card {
  background: var(--s1); border-radius: var(--r-lg);
  border: 1px solid var(--sep); overflow: hidden; margin-bottom: 12px;
}
.card-hdr {
  padding: 11px 16px; background: var(--s2); border-bottom: 1px solid var(--sep);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.card-title { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .9px; }
.card-title.amber { color: var(--amber); }
.card-title.blue  { color: var(--blue); }
.card-title.green { color: var(--green); }
.card-title.purple { color: var(--purple); }
.card-title.dim   { color: var(--l3); }
.formula-tag {
  font-family: var(--fm); font-size: 9.5px; color: var(--l4); padding: 3px 8px;
  background: var(--s3); border-radius: 6px; border: 1px solid var(--sep); white-space: nowrap;
}

/* SPEC BAR */
.spec-grid { display: flex; overflow-x: auto; }
.spec-grid::-webkit-scrollbar { display: none; }
.spec-cell { padding: 12px 16px; border-right: 1px solid var(--sep); flex-shrink: 0; }
.spec-cell:last-child { border-right: none; }
.spec-l { font-size: 9.5px; color: var(--l4); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 4px; font-weight: 600; }
.spec-v { font-family: var(--fm); font-size: 12.5px; font-weight: 600; color: var(--l1); }
.spec-v.hi { color: var(--amber); }

/* BREAKEVEN PAIR */
.be-grid { display: grid; grid-template-columns: 1fr 1fr; }
.be-cell { padding: 16px 18px; border-right: 1px solid var(--sep); }
.be-cell:last-child { border-right: none; }
.be-type { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
.be-type.fob { color: var(--blue); }
.be-type.cif { color: var(--green); }
.be-note { font-size: 10.5px; color: var(--l4); margin-bottom: 10px; }
.be-big  { font-family: var(--fm); font-size: 24px; font-weight: 700; color: var(--l1); letter-spacing: -1px; line-height: 1; }
.be-subs { font-family: var(--fm); font-size: 10px; color: var(--l3); margin-top: 7px; line-height: 1.8; }

/* COST TABLE */
.cost-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 16px; border-bottom: 1px solid var(--sep2);
}
.cost-row:last-child { border-bottom: none; }
.cost-row.total { background: var(--s2); border-top: 1px solid var(--sep); padding: 11px 16px; }
.cost-row.sub  { background: var(--s3); border-top: 1px solid var(--sep2); }
.c-name { font-size: 12px; color: var(--l2); font-weight: 400; }
.c-name.h { font-size: 12.5px; font-weight: 600; color: var(--l1); }
.c-name.ind { font-size: 11px; color: var(--l3); padding-left: 14px; }
.c-name.ind::before { content: '╰ '; color: var(--l4); }
.c-val { font-family: var(--fm); font-size: 12px; font-weight: 600; color: var(--l1); }
.c-val.hi { font-size: 13px; font-weight: 700; }
.c-val.fob { color: var(--blue); }
.c-val.cif { color: var(--green); }
.c-val.dim { color: var(--l3); font-weight: 400; }

/* SELL PRICE + MARGIN */
.three-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; }
.tg-cell { padding: 14px 18px; border-right: 1px solid var(--sep); }
.tg-cell:last-child { border-right: none; }
.tg-label { font-size: 9.5px; color: var(--l4); text-transform: uppercase; letter-spacing: .7px; font-weight: 600; margin-bottom: 10px; }
.tg-fob { font-family: var(--fm); font-size: 14px; font-weight: 700; color: var(--blue); }
.tg-cif { font-family: var(--fm); font-size: 14px; font-weight: 700; color: var(--green); margin-top: 5px; }
.tg-tag { font-size: 9.5px; color: var(--l4); margin-left: 4px; font-family: var(--fn); font-weight: 500; }

.mg-fob { font-family: var(--fm); font-size: 14px; font-weight: 700; color: var(--green); }
.mg-cif { font-family: var(--fm); font-size: 14px; font-weight: 700; color: var(--purple); margin-top: 5px; }

/* PORT REF TABLE */
.port-ref-table { width: 100%; border-collapse: collapse; }
.port-ref-table th {
  padding: 8px 14px; font-size: 9.5px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .8px; color: var(--l3); text-align: left;
  border-bottom: 1px solid var(--sep); background: var(--s2);
}
.port-ref-table th:not(:first-child) { text-align: right; }
.port-ref-table td {
  padding: 9px 14px; font-family: var(--fm); font-size: 11.5px; color: var(--l2);
  text-align: right; border-bottom: 1px solid var(--sep2);
}
.port-ref-table tr:last-child td { border-bottom: none; }
.port-ref-table td:first-child { text-align: left; color: var(--blue); font-weight: 600; }
.port-ref-table tr:hover td { background: var(--s2); }

/* TWO COL GRID */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }

/* COMING SOON */
.cs {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: calc(100vh - 106px); gap: 8px;
}
.cs h2 { font-size: 22px; font-weight: 700; color: var(--l2); }
.cs p  { font-size: 13px; color: var(--l4); }
</style>
</head>
<body>

<!-- ═══════════════ HEADER ═══════════════ -->
<div class="hdr">
  <div class="logo-wrap">
    <div class="logo-icon">JM</div>
    <div class="logo-info">
      <div class="logo-name">Jaydev Multicomm</div>
      <div class="logo-sub">Export Pricing Intelligence</div>
    </div>
  </div>
  <div class="hdr-right">
    <span class="save-chip" id="savePill">✓ Saved</span>
    <span id="clock"></span>
  </div>
</div>

<!-- ═══════════════ TAB BAR ═══════════════ -->
<div class="tab-bar" id="tabBar"></div>

<!-- ═══════════════ APP ═══════════════ -->
<div id="app"></div>

<script>
/* ─────────────────────────────────────────────
   PRODUCTS
───────────────────────────────────────────── */
const PRODUCTS = [
  { id: 'caustic',   label: 'Caustic Soda',    sub: 'Flakes',               active: true  },
  { id: 'sulphuric', label: 'Sulphuric Acid',   sub: '98%',                  active: true  },
  { id: 'calcium',   label: 'Calcium Chloride', sub: '',                     active: false },
  { id: 'pac',       label: 'PAC',              sub: 'Poly Aluminium Chloride', active: false },
  { id: 'h2o2',      label: 'H₂O₂',             sub: 'Hydrogen Peroxide',   active: false },
  { id: 'sulphur',   label: 'Sulphur',          sub: 'Granular',             active: false },
];

/* ─────────────────────────────────────────────
   PACKAGING
───────────────────────────────────────────── */
const PKG = {
  caustic: [
    { id: 'pkg_25bag', name: '25 KG HDPE Bag',     unit_weight: 25,    unit_cost: 15,    units_per_container: 1040 },
    { id: 'pkg_50bag', name: '50 KG HDPE Bag',     unit_weight: 50,    unit_cost: 28,    units_per_container: 520  },
    { id: 'pkg_1tbag', name: '1000 KG Jumbo Bag',  unit_weight: 1000,  unit_cost: 350,   units_per_container: 26   },
  ],
  sulphuric: [
    { id: 'pkg_ibc',   name: 'IBC Tank (1,650 KG)', unit_weight: 1650,  unit_cost: 8500,  units_per_container: 16  },
    { id: 'pkg_drum',  name: '200L Steel Drum (220 KG)', unit_weight: 220, unit_cost: 1200, units_per_container: 78 },
    { id: 'pkg_bulk',  name: 'ISO Bulk Tank (16,000 KG)', unit_weight: 16000, unit_cost: 22000, units_per_container: 1 },
  ],
};

/* ─────────────────────────────────────────────
   DEFAULTS
───────────────────────────────────────────── */
const DEF_CAUSTIC = {
  basic_rate: 42, selected_packaging: 'pkg_25bag', transport: 25000, usd_inr: 84,
  ocean_frt: 350, insurance: 0.35, margin: 8, moisture: 0.3,
  cha: 2600, exam: 4000, edi: 36, gate: 150,
  cfs: 10000, lolo: 3000, detention: 3000, ship_line: 30000,
  fumigation: 2500, lashing: 1500,
};

// Updated with correct port charges per quote
const DEF_SULPHURIC = {
  basic_rate: 32, selected_packaging: 'pkg_ibc', transport_kg: 1, usd_inr: 84,
  ocean_frt: 575, insurance: 0.5, margin: 10,
  // Port Charges (updated per formal quotation)
  custom_clearance:  3500,   // Custom Clearance
  carting_exam:      1000,   // Carting / Examination
  vgm_form13:        500,    // VGM & Form 13
  unloading:         1500,   // Unloading
  cfs_handling:      12000,  // CFS Handling (Receipted)
  container_repo:    5500,   // Container Repo Charges
  lifton:            3000,   // Lifton
  shipping_line:     35000,  // Shipping Line Local (BL + THC)
  lacing_choking:    0,      // Lacing / Choking (belt & wooden edge — at actual)
  // DG / IMDG
  dg_usd:  100,   // DG Surcharge UN 1830 Class 8 ($ / FCL)
  imdg:    4000,  // IMDG Documentation
  _v: 'v2',
};

/* ─────────────────────────────────────────────
   STATE / STORAGE
───────────────────────────────────────────── */
function loadState(id, def) {
  try {
    const s = localStorage.getItem('jm2_' + id);
    if (s) {
      const p = JSON.parse(s);
      // Version guard — reset sulphuric if old format (missing new keys)
      if (id === 'sulphuric' && p._v !== 'v2') return { ...def };
      return { ...def, ...p };
    }
  } catch(e) {}
  return { ...def };
}
function saveState(id, data) {
  try { localStorage.setItem('jm2_' + id, JSON.stringify(data)); flashSave(); } catch(e) {}
}
let _saveT;
function flashSave() {
  const el = document.getElementById('savePill');
  el.classList.add('show');
  clearTimeout(_saveT);
  _saveT = setTimeout(() => el.classList.remove('show'), 1800);
}

const S = {
  caustic:   loadState('caustic',   DEF_CAUSTIC),
  sulphuric: loadState('sulphuric', DEF_SULPHURIC),
};

/* ─────────────────────────────────────────────
   CALCULATIONS
───────────────────────────────────────────── */
function calcCaustic(d) {
  const pkg = PKG.caustic.find(p => p.id === d.selected_packaging);
  const upc  = d.pkg_units_per_ctr !== undefined ? d.pkg_units_per_ctr : pkg.units_per_container;
  const uw   = d.pkg_unit_weight   !== undefined ? d.pkg_unit_weight   : pkg.unit_weight;
  const uc   = d.pkg_unit_cost     !== undefined ? d.pkg_unit_cost     : pkg.unit_cost;

  const total_kg    = upc * uw * (1 - d.moisture / 100);
  const total_mt    = total_kg / 1000;
  const procurement = d.basic_rate * total_kg;
  const bag_total   = uc * upc;
  const port        = d.cha + d.exam + d.edi + d.gate + d.cfs + d.lolo + d.detention + d.ship_line + d.fumigation + d.lashing;
  const fob_inr     = procurement + bag_total + d.transport + port;
  const fob_usd     = fob_inr / d.usd_inr;
  const fob_per_kg  = fob_per_kg_usd = fob_usd / total_kg;
  const fob_per_mt  = fob_per_kg * 1000;

  const ocean_inr = d.ocean_frt * total_mt * d.usd_inr;
  const ins_inr   = fob_inr * d.insurance / 100;
  const cif_inr   = fob_inr + ocean_inr + ins_inr;
  const cif_usd   = cif_inr / d.usd_inr;
  const cif_per_kg = cif_usd / total_kg;
  const cif_per_mt = cif_per_kg * 1000;

  const sfob_kg = fob_per_kg * (1 + d.margin / 100);
  const scif_kg = cif_per_kg * (1 + d.margin / 100);

  return {
    total_kg, total_mt, procurement, bag_total, port,
    fob_inr, fob_usd, fob_per_kg, fob_per_mt,
    ocean_inr, ins_inr, cif_inr, cif_usd, cif_per_kg, cif_per_mt,
    sfob_kg, sfob_mt: sfob_kg * 1000, sfob_ctr: sfob_kg * total_kg,
    scif_kg, scif_mt: scif_kg * 1000, scif_ctr: scif_kg * total_kg,
    mfob_mt:  (sfob_kg - fob_per_kg) * 1000,
    mfob_ctr: (sfob_kg - fob_per_kg) * total_kg,
    mcif_mt:  (scif_kg - cif_per_kg) * 1000,
    mcif_ctr: (scif_kg - cif_per_kg) * total_kg,
    pkg_name: pkg.name, upc,
  };
}

function calcSulphuric(d) {
  const pkg = PKG.sulphuric.find(p => p.id === d.selected_packaging);
  const upc  = d.pkg_units_per_ctr !== undefined ? d.pkg_units_per_ctr : pkg.units_per_container;
  const uw   = d.pkg_unit_weight   !== undefined ? d.pkg_unit_weight   : pkg.unit_weight;
  const uc   = d.pkg_unit_cost     !== undefined ? d.pkg_unit_cost     : pkg.unit_cost;

  const total_kg    = upc * uw;
  const total_mt    = total_kg / 1000;
  const procurement = d.basic_rate * total_kg;
  const tank_total  = uc * upc;
  const transport   = d.transport_kg * total_kg;

  // Port charges breakdown (updated per formal quotation)
  const port_local = (d.custom_clearance || 0) + (d.carting_exam || 0) + (d.vgm_form13 || 0)
                   + (d.unloading || 0) + (d.cfs_handling || 0) + (d.container_repo || 0)
                   + (d.lifton || 0) + (d.shipping_line || 0) + (d.lacing_choking || 0);
  const dg_inr      = d.dg_usd * d.usd_inr;
  const port        = port_local + dg_inr + (d.imdg || 0);

  const fob_inr    = procurement + tank_total + transport + port;
  const fob_usd    = fob_inr / d.usd_inr;
  const fob_per_kg = fob_usd / total_kg;
  const fob_per_mt = fob_per_kg * 1000;

  const ocean_inr  = d.ocean_frt * total_mt * d.usd_inr;
  const ins_inr    = fob_inr * d.insurance / 100;
  const cif_inr    = fob_inr + ocean_inr + ins_inr;
  const cif_usd    = cif_inr / d.usd_inr;
  const cif_per_kg = cif_usd / total_kg;
  const cif_per_mt = cif_per_kg * 1000;

  const sfob_kg = fob_per_kg * (1 + d.margin / 100);
  const scif_kg = cif_per_kg * (1 + d.margin / 100);

  return {
    total_kg, total_mt, procurement, tank_total, transport,
    port_local, dg_inr, imdg: d.imdg || 0, port,
    fob_inr, fob_usd, fob_per_kg, fob_per_mt,
    ocean_inr, ins_inr, cif_inr, cif_usd, cif_per_kg, cif_per_mt,
    sfob_kg, sfob_mt: sfob_kg * 1000, sfob_ctr: sfob_kg * total_kg,
    scif_kg, scif_mt: scif_kg * 1000, scif_ctr: scif_kg * total_kg,
    mfob_mt:  (sfob_kg - fob_per_kg) * 1000,
    mfob_ctr: (sfob_kg - fob_per_kg) * total_kg,
    mcif_mt:  (scif_kg - cif_per_kg) * 1000,
    mcif_ctr: (scif_kg - cif_per_kg) * total_kg,
    pkg_name: pkg.name, upc,
  };
}

    <!-- CIF BUILD-UP -->
    <div class="card">
      <div class="card-hdr">
        <span class="card-title green">CIF Cost Build-Up</span>
        <span class="formula-tag">FOB + Ocean Freight + Insurance</span>
      </div>
      ${ROW('FOB Base', inr(c.fob_inr))}
      ${ROW('+ Ocean Freight ($' + d.ocean_frt + '/MT × ' + f2(c.total_mt) + ' MT)', inr(c.ocean_inr))}
      ${ROW('+ Marine Insurance (' + d.insurance + '% of FOB)', inr(c.ins_inr))}
      ${ROW('CIF Total (₹)', inr(c.cif_inr), 'total')}
      ${ROW('CIF Total (USD)', usd(c.cif_usd, 0))}
      ${ROW('CIF per KG', usd(c.cif_per_kg, 4))}
      ${ROW('CIF per MT', usd(c.cif_per_mt, 2))}
    </div>

  </div><!-- /two-col -->

  <!-- SELLING PRICE -->
  <div class="card">
    <div class="card-hdr">
      <span class="card-title amber">Offer / Selling Price</span>
      <span class="formula-tag">Breakeven × (1 + ${d.margin}% margin)</span>
    </div>
    <div class="three-grid">
      <div class="tg-cell">
        <div class="tg-label">Per Kilogram</div>
        <div class="tg-fob">${usd(c.sfob_kg, 4)} <span class="tg-tag">FOB</span></div>
        <div class="tg-cif">${usd(c.scif_kg, 4)} <span class="tg-tag">CIF</span></div>
      </div>
      <div class="tg-cell">
        <div class="tg-label">Per Metric Ton</div>
        <div class="tg-fob">${usd(c.sfob_mt, 2)} <span class="tg-tag">FOB</span></div>
        <div class="tg-cif">${usd(c.scif_mt, 2)} <span class="tg-tag">CIF</span></div>
      </div>
      <div class="tg-cell">
        <div class="tg-label">Per FCL (${f2(c.total_mt)} MT)</div>
        <div class="tg-fob">${usd(c.sfob_ctr, 0)} <span class="tg-tag">FOB</span></div>
        <div class="tg-cif">${usd(c.scif_ctr, 0)} <span class="tg-tag">CIF</span></div>
      </div>
    </div>
  </div>

  <!-- MARGIN SUMMARY -->
  <div class="card">
    <div class="card-hdr">
      <span class="card-title purple">Gross Margin Summary</span>
      <span class="formula-tag">Sell Price − Breakeven = Margin</span>
    </div>
    <div class="three-grid">
      <div class="tg-cell">
        <div class="tg-label">Per Metric Ton</div>
        <div class="mg-fob">${usd(c.mfob_mt, 2)} <span class="tg-tag">FOB</span></div>
        <div class="mg-cif">${usd(c.mcif_mt, 2)} <span class="tg-tag">CIF</span></div>
      </div>
      <div class="tg-cell">
        <div class="tg-label">Per FCL (USD)</div>
        <div class="mg-fob">${usd(c.mfob_ctr, 0)} <span class="tg-tag">FOB</span></div>
        <div class="mg-cif">${usd(c.mcif_ctr, 0)} <span class="tg-tag">CIF</span></div>
      </div>
      <div class="tg-cell">
        <div class="tg-label">Per FCL (INR)</div>
        <div class="mg-fob">${inr(c.mfob_ctr * d.usd_inr)} <span class="tg-tag">FOB</span></div>
        <div class="mg-cif">${inr(c.mcif_ctr * d.usd_inr)} <span class="tg-tag">CIF</span></div>
      </div>
    </div>
  </div>

  <!-- DG NOTICE -->
  <div class="card">
    <div class="card-hdr">
      <span class="card-title dim">DG Classification Notice</span>
    </div>
    <div class="cost-row">
      <span class="c-name">UN Number</span><span class="c-val">UN 1830</span>
    </div>
    <div class="cost-row">
      <span class="c-name">Hazard Class</span><span class="c-val">8 — Corrosive</span>
    </div>
    <div class="cost-row">
      <span class="c-name">Lacing / Choking</span><span class="c-val dim">${d.lacing_choking > 0 ? inr(d.lacing_choking) : 'At actual — belt &amp; wooden edge'}</span>
    </div>
    <div class="cost-row">
      <span class="c-name">GST</span><span class="c-val dim">As applicable</span>
    </div>
    <div class="cost-row">
      <span class="c-name">Any Other Charges</span><span class="c-val dim">At actual or as agreed</span>
    </div>
  </div>

</div><!-- /panel-right -->
</div><!-- /layout -->`;
}

/* ─────────────────────────────────────────────
   EVENT HANDLERS
───────────────────────────────────────────── */
window.upd = function(prod, key, val) {
  S[prod][key] = parseFloat(val) || val;
  if (key === 'selected_packaging') {
    delete S[prod].pkg_unit_weight;
    delete S[prod].pkg_units_per_ctr;
  }
  saveState(prod, S[prod]);
  refreshResults();
};

window.reset = function(prod) {
  const def = prod === 'caustic' ? DEF_CAUSTIC : DEF_SULPHURIC;
  S[prod] = { ...def };
  delete S[prod].pkg_unit_weight;
  delete S[prod].pkg_units_per_ctr;
  localStorage.removeItem('jm2_' + prod);
  render();
};

/* ─────────────────────────────────────────────
   RENDER — Partial (avoid input refocus)
───────────────────────────────────────────── */
function refreshResults() {
  const rp = document.querySelector('.panel-right');
  if (!rp) { render(); return; }
  const tmp = document.createElement('div');
  if (active === 'caustic')   tmp.innerHTML = renderCaustic();
  else if (active === 'sulphuric') tmp.innerHTML = renderSulphuric();
  const newRp = tmp.querySelector('.panel-right');
  if (newRp) rp.innerHTML = newRp.innerHTML;
}

let active = 'caustic';

window.switchTab = function(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p.active) return;
  active = id;
  render();
};

function render() {
  // Tabs
  document.getElementById('tabBar').innerHTML = PRODUCTS.map(p => `
    <button class="tab-btn ${p.active && active === p.id ? 'active' : ''} ${!p.active ? 'soon' : ''}"
      onclick="switchTab('${p.id}')">
      ${p.label}${p.sub ? ` <span style="opacity:.55;font-size:11px;font-weight:500">${p.sub}</span>` : ''}
      ${!p.active ? `<span class="soon-tag">SOON</span>` : ''}
    </button>`).join('');

  const app = document.getElementById('app');
  if      (active === 'caustic')   app.innerHTML = renderCaustic();
  else if (active === 'sulphuric') app.innerHTML = renderSulphuric();
  else {
    const p = PRODUCTS.find(x => x.id === active);
    app.innerHTML = `<div class="cs"><h2>${p.label}</h2><p>Calculator in development.</p></div>`;
  }
}

/* Clock */
function tick() {
  const n = new Date();
  document.getElementById('clock').textContent =
    n.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) +
    ' · ' + n.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
}
tick(); setInterval(tick, 30000);

render();
</script>
</body>
